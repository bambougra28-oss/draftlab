name: Deploy (GitHub Pages)

# Static SPA (adapter-static) → GitHub Pages. No external account or secret:
# the deployment uses the automatic GITHUB_TOKEN. Project site is served at
# /<repo>, so the build sets BASE_PATH to match.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (static SPA, base = /draftlab)
        run: pnpm build
        env:
          BASE_PATH: /draftlab

      # adapter-static writes the SPA shell to 404.html (GitHub Pages serves it
      # for deep links). Copy it to index.html so the site root returns 200.
      - name: SPA root entry
        run: cp build/404.html build/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - id: deployment
        uses: actions/deploy-pages@v4
